<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e2129;
    --border: #2a2e38;
    --text: #e8e9ec;
    --muted: #8b8f9a;
    --accent: #6c8cff;
    --accent-2: #4dd6a8;
    --danger: #ff6b6b;
    --warn: #ffb84d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(160deg, var(--bg), #14161c 60%);
    color: var(--text);
    min-height: 100vh;
  }
  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 24px;
    margin: 0;
    letter-spacing: -0.02em;
  }
  header h1 span { color: var(--accent); }
  .stats {
    display: flex;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .stats b { color: var(--text); }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
  }

  form#taskForm {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 10px;
    margin-bottom: 20px;
  }
  input, select, button {
    font-family: inherit;
    font-size: 14px;
  }
  #taskInput {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    outline: none;
    min-width: 0;
  }
  #taskInput:focus { border-color: var(--accent); }
  select#prioritySelect, input#dueInput {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 10px;
    border-radius: 10px;
    outline: none;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 10px;
    padding: 12px 18px;
    font-weight: 600;
    background: var(--accent);
    color: #0b0d12;
    transition: transform 0.08s ease, opacity 0.15s ease;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.97); }

  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filters button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-weight: 500;
    padding: 8px 14px;
  }
  .filters button.active {
    background: var(--panel-2);
    color: var(--text);
    border-color: var(--accent);
  }
  .filters .spacer { flex: 1; }
  .filters button.clear {
    border-color: var(--danger);
    color: var(--danger);
    background: transparent;
  }

  ul#taskList {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  li.task {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    transition: opacity 0.15s ease;
  }
  li.task.done { opacity: 0.55; }
  li.task.done .task-text { text-decoration: line-through; color: var(--muted); }

  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 13px;
    color: var(--accent-2);
    background: transparent;
  }
  li.task.done .checkbox {
    background: var(--accent-2);
    border-color: var(--accent-2);
    color: #0b0d12;
  }

  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-size: 14.5px;
    word-break: break-word;
  }
  .task-meta {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    font-size: 11.5px;
    color: var(--muted);
    align-items: center;
  }
  .badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 10.5px;
    letter-spacing: 0.02em;
  }
  .badge.high { background: rgba(255,107,107,0.15); color: var(--danger); }
  .badge.medium { background: rgba(255,184,77,0.15); color: var(--warn); }
  .badge.low { background: rgba(77,214,168,0.15); color: var(--accent-2); }
  .due.overdue { color: var(--danger); font-weight: 600; }

  .icon-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 6px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }
  .icon-btn:hover { color: var(--danger); background: rgba(255,255,255,0.05); }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 0;
    font-size: 14px;
  }

  footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    form#taskForm { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Task<span>Flow</span></h1>
      <div class="stats">
        <span><b id="statTotal">0</b> total</span>
        <span><b id="statDone">0</b> done</span>
        <span><b id="statPending">0</b> pending</span>
      </div>
    </header>

    <div class="card">
      <form id="taskForm">
        <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off" required>
        <input type="date" id="dueInput">
        <select id="prioritySelect">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <button type="submit">Add Task</button>
      </form>

      <div class="filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="pending">Pending</button>
        <button data-filter="done">Done</button>
        <div class="spacer"></div>
        <button class="clear" id="clearDone">Clear completed</button>
      </div>

      <ul id="taskList"></ul>
      <div class="empty" id="emptyState" style="display:none;">No tasks here. Add one above.</div>
    </div>

    <footer>Tasks are saved locally in your browser.</footer>
  </div>

<script>
(function () {
  const STORAGE_KEY = 'taskflow.tasks.v1';
  let tasks = load();
  let filter = 'all';

  const form = document.getElementById('taskForm');
  const input = document.getElementById('taskInput');
  const dueInput = document.getElementById('dueInput');
  const prioritySelect = document.getElementById('prioritySelect');
  const list = document.getElementById('taskList');
  const emptyState = document.getElementById('emptyState');
  const filterBtns = document.querySelectorAll('.filters button[data-filter]');
  const clearDoneBtn = document.getElementById('clearDone');

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function isOverdue(task) {
    if (!task.due || task.done) return false;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return new Date(task.due) < today;
  }

  function formatDate(str) {
    if (!str) return '';
    const d = new Date(str + 'T00:00:00');
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function render() {
    const filtered = tasks.filter(t => {
      if (filter === 'pending') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    list.innerHTML = '';
    emptyState.style.display = filtered.length === 0 ? 'block' : 'none';

    filtered
      .slice()
      .sort((a, b) => a.done - b.done || b.createdAt - a.createdAt)
      .forEach(task => {
        const li = document.createElement('li');
        li.className = 'task' + (task.done ? ' done' : '');
        li.dataset.id = task.id;

        const overdue = isOverdue(task);
        li.innerHTML = `
          <button class="checkbox" title="Toggle complete">${task.done ? '✓' : ''}</button>
          <div class="task-body">
            <div class="task-text"></div>
            <div class="task-meta">
              <span class="badge ${task.priority}">${task.priority}</span>
              ${task.due ? `<span class="due${overdue ? ' overdue' : ''}">${overdue ? 'Overdue: ' : 'Due '}${formatDate(task.due)}</span>` : ''}
            </div>
          </div>
          <button class="icon-btn" title="Delete task">✕</button>
        `;
        li.querySelector('.task-text').textContent = task.text;
        list.appendChild(li);
      });

    document.getElementById('statTotal').textContent = tasks.length;
    document.getElementById('statDone').textContent = tasks.filter(t => t.done).length;
    document.getElementById('statPending').textContent = tasks.filter(t => !t.done).length;
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    tasks.push({
      id: uid(),
      text,
      done: false,
      priority: prioritySelect.value,
      due: dueInput.value || null,
      createdAt: Date.now()
    });
    input.value = '';
    dueInput.value = '';
    prioritySelect.value = 'medium';
    save();
    render();
    input.focus();
  });

  list.addEventListener('click', e => {
    const li = e.target.closest('li.task');
    if (!li) return;
    const id = li.dataset.id;

    if (e.target.classList.contains('checkbox')) {
      const task = tasks.find(t => t.id === id);
      if (task) task.done = !task.done;
      save();
      render();
    } else if (e.target.classList.contains('icon-btn')) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      filterBtns.forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  clearDoneBtn.addEventListener('click', () => {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  });

  render();
})();
</script>
</body>
</html>
